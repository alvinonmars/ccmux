<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KidPad - Break Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="lock-screen" id="lockScreen">
        <div class="lock-icon" id="icon">&#x1F512;</div>
        <div class="lock-message" id="message">Tablet is locked.</div>
        <div class="countdown" id="countdown" style="display:none">20</div>
        <div class="tomorrow-schedule" id="tomorrowSchedule" style="display:none">
            <div class="tomorrow-label">Tomorrow</div>
            <div id="tomorrowList"></div>
        </div>
    </div>
    <script src="lock.js"></script>
</body>
</html>
